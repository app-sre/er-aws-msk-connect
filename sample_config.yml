# Sample app-interface defaults file for an MSK Connect connector.
#
# Tenant only needs to configure:
#   - custom_plugin: where the plugin JAR/ZIP lives in S3
#   - connector_configuration: plugin-specific key-value pairs
#
# Everything else has sensible defaults or is resolved automatically:
#   - kafka_cluster_bootstrap_servers: resolved from msk_cluster reference (vault secret)
#   - vpc (subnets, security_groups): resolved from msk_cluster reference (MSK defaults)
#   - service_execution_role: resolved from service_execution_role reference (IAM role identifier)
#   - kafka_connect_version: defaults to "3.7.1"
#   - capacity: defaults to provisioned, 1 MCU, 1 worker
#
# Namespace file example:
#
#   - provider: msk-connect
#     identifier: my-s3-sink
#     managed_by_erv2: true
#     defaults: /terraform/msk-connect/s3-sink.yml
#     msk_cluster: my-kafka-cluster              # identifier of MSK cluster in same block
#     service_execution_role: my-connector-role   # identifier of aws-iam-role in same block

$schema: /aws/msk-connect-defaults-1.yml

custom_plugin:
  s3_bucket: my-msk-connect-plugins
  s3_key: plugins/confluentinc-kafka-connect-s3-10.5.7.zip
  content_type: zip

connector_configuration:
  connector.class: com.github.jcustenborder.kafka.connect.transform.common.BytesToString
  tasks.max: "1"
  topics: my-topic
  s3.bucket.name: my-data-lake
  s3.region: us-east-1
  flush.size: "1000"
  storage.class: io.confluent.connect.s3.storage.S3Storage
  format.class: io.confluent.connect.s3.format.json.JsonFormat

log_delivery:
  cloudwatch_logs:
    enabled: true
    retention_in_days: 7

# Optional overrides (all have defaults):

# kafka_connect_version: "3.7.1"

# capacity:
#   autoscaling:
#     min_worker_count: 1
#     max_worker_count: 4

# worker_configuration: |
#   key.converter=org.apache.kafka.connect.json.JsonConverter
#   value.converter=org.apache.kafka.connect.json.JsonConverter
#   key.converter.schemas.enable=false
#   value.converter.schemas.enable=false
